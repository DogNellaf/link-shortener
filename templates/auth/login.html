{% extends 'layouts/auth.html' %}
{% load static %}
{% block title %}Авторизация{% endblock %}
{% block content %}
  <div class="login">
    <h1>Логин</h1>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
  
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <input id="emailInput" name="email" type="email" placeholder="Email" />
      <input id="passwordInput" name="password" type="password" placeholder="Пароль" />
      <input id="submitButton" class="submit-button" type="submit" value="Войти" />
    </form>
  
    <div class="links">
      <a id="resetPasswordLink" href="{% url 'password_reset_request' %}">Восстановить пароль</a>
      <a id="registrationLink" href="{% url 'registration' %}">Регистрация</a>
    </div>
  
    <script>
      function checkActive() {
        if (emailInput.value == "" || passwordInput.value == "") {
          submitButton.classList.remove("active");
          submitButton.classList.remove("sky-hovered");
          submitButton.removeAttribute("type");
        }
        else
        {
          submitButton.classList.add("active");
          submitButton.classList.add("sky-hovered");
          submitButton.setAttribute("type", "submit");
        }
      }
  
      emailInput.addEventListener("input", function () {
        checkActive();
      });
  
      passwordInput.addEventListener("input", function () {
        checkActive();
      });
    </script>
  </div>
{% endblock %}
