{% load static %}
<div id="downloadQr" hidden>
    <div class="background"></div>
    <div class="frame">
        <h1>Скачать QR код</h1>
        <img class="cross" src="{% static 'images/svg/normal/cross.svg' %}" onclick="downloadQr.setAttribute('hidden', 'hidden')"/>
        <div class="buttons">
            <button id="downloadPngButton">
                <p>.PNG</p>
            </button>
            <button id="downloadSvgButton">
                <p>.SVG</p>
            </button>   
        </div>
    </div>
</div>
<script src="{% static 'js/parts/download_qr.js' %}"></script>
