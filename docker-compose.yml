version: "3.8"

services:
  db:
    image: postgres:12
    container_name: dtb_postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=linkshortener
    ports:
      - "5433:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dtb_django
    restart: always
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - IS_FOR_RENDER=true
      - DB_NAME=linkshortener
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
    env_file:
      - ./.env

volumes:
  postgres_data:
